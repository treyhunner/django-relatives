[tox]
envlist =
    py{310,311,312}-django4.2,
    py{310,311,312,313}-django5.2,
    docs, pre-commit
isolated_build = True


[testenv]
commands = coverage run -a runtests.py
deps =
    django4.2: Django>=4.2,<4.3
    django5.2: Django>=5.2,<5.3
    coverage == 7.4.0


[testenv:docs]
deps =
    -r docs/requirements.txt
commands =
    sphinx-build -W -b dirhtml -d {envtmpdir}/doctrees docs {envtmpdir}/html


[testenv:pre-commit]
deps =
    pre-commit
commands = pre-commit {posargs}


[gh-actions]
python =
    3.10: py310
    3.11: py311
    3.12: py312
    3.13: py313
