[tox]
envlist =
    py{310,311,312}-django4.2,
    py{310,311,312,313,314}-django5.2,

[testenv]
commands = coverage run --parallel-mode runtests.py
deps =
    django4.2: Django>=4.2,<4.3
    django5.2: Django>=5.2,<5.3
    coverage

[gh-actions]
python =
    3.10: py310
    3.11: py311
    3.12: py312
    3.13: py313
    3.14: py314
